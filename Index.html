<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <style>
      :root {
        color-scheme: light;
        --panel: rgba(255, 255, 255, 0.85);
        --border: rgba(74, 57, 36, 0.14);
        --text: #2f2418;
        --muted: #6b5d4f;
        --accent: #8d5a2b;
        --accent-strong: #633b17;
        --chip: #eadac4;
        --shadow: 0 18px 50px rgba(43, 30, 16, 0.10);
      }

      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: Georgia, Garamond, "Times New Roman", serif;
        font-size: 17px;
        line-height: 1.55;
        background:
          radial-gradient(circle at top left, rgba(255, 248, 234, 0.92), transparent 30%),
          radial-gradient(circle at top right, rgba(223, 198, 169, 0.35), transparent 26%),
          linear-gradient(180deg, #f7f2ea 0%, #f3efe7 100%);
      }

      .app { width: min(100%, 1040px); margin: 0 auto; padding: 16px 16px 28px; }
      .hero, .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }
      .hero { display: grid; gap: 14px; padding: 20px; border-radius: 24px; }
      .hero-left { display: grid; gap: 8px; align-content: start; }
      .title-row {
        display: flex;
        align-items: flex-start;
        gap: 28px;
        flex-wrap: wrap;
      }
      .eyebrow-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }
      .eyebrow {
        margin: 0 0 6px;
        color: var(--accent);
        font-size: 0.86rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      h1, h2, p { margin: 0; }
      h1 { font-size: clamp(2rem, 6vw, 3.4rem); line-height: 0.98; letter-spacing: -0.03em; }
      .title-side {
        display: grid;
        gap: 4px;
        align-content: start;
        padding-top: 6px;
      }
      .quote {
        color: rgba(99, 59, 23, 0.50);
        font-size: 1rem;
        font-style: italic;
        font-weight: 400;
        line-height: 1.2;
        max-width: 24ch;
      }
      .header-date {
        color: rgba(99, 59, 23, 0.50);
        font-size: 0.92rem;
        font-style: italic;
        line-height: 1.2;
        text-align: left;
        white-space: nowrap;
      }
      .header-user {
        color: var(--accent);
        font-size: 0.92rem;
        font-style: italic;
        line-height: 1.2;
        white-space: nowrap;
      }
      .header-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: baseline;
        justify-content: flex-end;
      }
      .pill {
        display: inline-flex; align-items: center; min-height: 40px; padding: 8px 12px;
        border-radius: 999px; background: rgba(141, 90, 43, 0.10); color: var(--accent-strong); font-size: 0.95rem;
      }
      .grid { display: grid; gap: 16px; margin-top: 16px; }
      .panel { padding: 18px; border-radius: 22px; }
      .panel-head {
        display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 14px;
      }
      .panel-head span, .small-note, .muted, .status { color: var(--muted); font-size: 0.92rem; }
      label { display: block; margin-bottom: 6px; font-size: 0.95rem; color: var(--muted); }
      input, textarea, select, button { font: inherit; }
      input, textarea, select {
        width: 100%; border-radius: 14px; border: 1px solid rgba(74, 57, 36, 0.18);
        background: rgba(255, 255, 255, 0.92); color: var(--text); padding: 12px 14px; outline: none;
      }
      input:focus, textarea:focus, select:focus {
        border-color: rgba(141, 90, 43, 0.55); box-shadow: 0 0 0 4px rgba(141, 90, 43, 0.12);
      }
      input, select { min-height: 46px; }
      textarea { min-height: 180px; resize: vertical; line-height: 1.6; font-size: 17px; }
      .composer-grid, .special-grid, .filter-row, .view-row { display: grid; gap: 12px; }
      .composer-grid {
        grid-template-columns: 1fr;
        grid-auto-flow: row;
      }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
      button {
        min-height: 46px; padding: 12px 16px; border: 0; border-radius: 14px;
        background: var(--accent); color: white; cursor: pointer; box-shadow: 0 10px 24px rgba(141, 90, 43, 0.18);
      }
      button.secondary { background: rgba(141, 90, 43, 0.12); color: var(--accent-strong); box-shadow: none; }
      button:disabled { opacity: 0.65; cursor: wait; }
      details {
        margin-top: 8px; border-radius: 18px; border: 1px solid rgba(74, 57, 36, 0.12);
        background: rgba(255, 255, 255, 0.50); padding: 10px 12px;
      }
      summary { cursor: pointer; color: var(--accent-strong); font-weight: 600; list-style: none; }
      summary::-webkit-details-marker { display: none; }
      .entry-list, .special-list { display: grid; gap: 12px; }
      .entry-card, .special-card {
        padding: 16px; border-radius: 18px; background: rgba(255, 255, 255, 0.90); border: 1px solid rgba(74, 57, 36, 0.10);
      }
      .entry-top { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
      .entry-date { font-weight: 700; }
      .chips { display: flex; flex-wrap: wrap; gap: 6px; }
      .chip {
        display: inline-flex; align-items: center; min-height: 28px; padding: 4px 10px;
        border-radius: 999px; background: var(--chip); color: var(--accent-strong); font-size: 0.86rem;
      }
      .entry-card .chip, .special-card .chip {
        min-height: 24px;
        padding: 2px 8px;
        font-size: 0.78rem;
      }
      .special-card .chip {
        background: rgba(141, 90, 43, 0.12);
      }
      .entry-save {
        display: flex;
        align-items: flex-end;
        justify-content: flex-start;
      }
      .entry-save button {
        min-height: 36px;
        padding: 8px 10px;
        font-size: 0.86rem;
        width: auto;
      }
      .entry-content { white-space: pre-wrap; word-break: break-word; }
      .entry-meta { margin-top: 8px; color: var(--muted); font-size: 0.9rem; }
      .toolbar { display: grid; gap: 12px; grid-template-columns: 1fr; margin-bottom: 14px; }
      .view-info {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: flex-end;
        min-height: 28px;
      }
      @media (min-width: 760px) {
        .hero { grid-template-columns: 1fr auto; align-items: end; }
        .hero-left { min-width: min(56ch, 100%); }
        .composer-grid {
          grid-template-columns: 220px 220px 1fr;
          grid-template-areas:
            "date location content"
            "save . content";
          align-items: start;
        }
        .entry-date-field { grid-area: date; align-self: start; }
        .entry-location-field { grid-area: location; align-self: start; }
        .entry-content-field { grid-area: content; align-self: start; }
        .entry-save { grid-area: save; align-self: end; }
        .special-grid { grid-template-columns: 220px 1fr auto; align-items: end; }
        .filter-row { grid-template-columns: 1fr 220px; align-items: end; }
        .view-row { grid-template-columns: 220px 1fr auto; align-items: end; }
      }
      @media (max-width: 759px) {
        html { font-size: 18px; }
        .app { padding: 12px 12px 20px; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="hero-left">
          <div class="eyebrow-row">
            <p class="eyebrow">Journal</p>
            <span class="header-user" id="userPill">Loading user...</span>
          </div>
          <div class="title-row">
            <h1>Dust</h1>
            <div class="title-side">
              <span class="header-date" id="todayPill">Loading date...</span>
              <span class="quote">I am large, I contain multitudes.</span>
            </div>
          </div>
        </div>
      </header>

      <div class="grid">
        <section class="panel">
          <div class="panel-head">
            <h2>On this day</h2>
            <span id="entryCount">Loading...</span>
          </div>

          <div class="toolbar">
            <div class="view-row">
              <div>
                <input type="date" id="previewDate" aria-label="Preview date">
              </div>
              <div class="view-info" id="viewInfo" aria-live="polite"></div>
            </div>
            <!-- Search and sort retained in JS for future use.
            <div class="filter-row">
              <div>
                <label for="search">Search</label>
                <input type="search" id="search" placeholder="Filter by text, location, or label">
              </div>
              <div>
                <label for="sortMode">Sort</label>
                <select id="sortMode">
                  <option value="newest">Newest first</option>
                  <option value="oldest">Oldest first</option>
                </select>
              </div>
            </div>
            -->
            <div class="status" id="status"></div>
          </div>

          <div id="entries" class="entry-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Today</h2>
            <span>Saved to Dust</span>
          </div>

          <form id="entryForm">
            <div class="composer-grid">
              <div class="entry-date-field">
                <label for="entryDate">Entry date</label>
                <input type="date" id="entryDate" name="entryDate">
              </div>
              <div class="entry-location-field">
                <label for="entryLocation">Location</label>
                <input type="text" id="entryLocation" name="entryLocation" placeholder="Seattle, WA">
              </div>
              <div class="entry-content-field">
                <label for="contents">Entry text</label>
                <textarea id="contents" name="contents" placeholder="Do I contradict myself?"></textarea>
              </div>
              <div class="entry-save">
                <button type="submit" id="saveEntryBtn">Save entry</button>
              </div>
            </div>
          </form>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Special dates</h2>
            <span>Shown as tags in On this day</span>
          </div>

          <details>
            <summary>Add a special date</summary>
            <form id="specialDateForm" style="margin-top: 12px;">
              <div class="special-grid">
                <div>
                  <label for="specialDate">Date</label>
                  <input type="date" id="specialDate" name="specialDate">
                </div>
                <div>
                  <label for="specialLabel">Label</label>
                  <input type="text" id="specialLabel" name="specialLabel" placeholder="Sarah's Birthday">
                </div>
                <div>
                  <label for="repeatAnnually">Repeat</label>
                  <select id="repeatAnnually" name="repeatAnnually">
                    <option value="true">Every year</option>
                    <option value="false">One time</option>
                  </select>
                </div>
              </div>
              <div class="actions">
                <button type="submit" id="saveSpecialBtn">Add date</button>
              </div>
            </form>
          </details>

          <div class="small-note" style="margin: 14px 0 10px;">Current SpecialDates sheet entries</div>
          <div id="specialDates" class="special-list"></div>
        </section>
      </div>
    </div>

    <script>
      const state = {
        entries: [],
        specialDates: [],
        user: null,
        today: '',
        previewDate: '',
        view: null,
      };

      const els = {
        todayPill: document.getElementById('todayPill'),
        userPill: document.getElementById('userPill'),
        status: document.getElementById('status'),
        entries: document.getElementById('entries'),
        specialDates: document.getElementById('specialDates'),
        entryCount: document.getElementById('entryCount'),
        search: document.getElementById('search'),
        sortMode: document.getElementById('sortMode'),
        entryForm: document.getElementById('entryForm'),
        specialDateForm: document.getElementById('specialDateForm'),
        entryDate: document.getElementById('entryDate'),
        entryLocation: document.getElementById('entryLocation'),
        previewDate: document.getElementById('previewDate'),
        contents: document.getElementById('contents'),
        specialDate: document.getElementById('specialDate'),
        specialLabel: document.getElementById('specialLabel'),
        repeatAnnually: document.getElementById('repeatAnnually'),
        saveEntryBtn: document.getElementById('saveEntryBtn'),
        saveSpecialBtn: document.getElementById('saveSpecialBtn'),
        viewInfo: document.getElementById('viewInfo'),
      };

      function setStatus(message) { els.status.textContent = message || ''; }
      function setLoading(button, isLoading, label) { button.disabled = isLoading; button.textContent = isLoading ? 'Working...' : label; }

      function loadAppData(referenceDate) {
        setStatus('Loading entries...');
        const dateArg = referenceDate === undefined ? (els.previewDate.value || state.previewDate || '') : referenceDate;
        google.script.run
          .withSuccessHandler(data => {
            state.entries = data.entries || [];
            state.specialDates = data.specialDates || [];
            state.user = data.user || null;
            state.today = data.today || '';
            state.previewDate = data.previewDate || '';
            state.view = data.view || null;
            renderShell();
            renderSpecialDates();
            renderEntries();
            setStatus('');
          })
          .withFailureHandler(err => {
            setStatus(err && err.message ? err.message : 'Failed to load app data.');
          })
          .getAppData(dateArg);
      }

      function renderShell() {
        els.todayPill.textContent = state.today ? formatDateForDisplay(state.today) : '';
        els.userPill.textContent = state.user && state.user.name
          ? (state.user.email ? `${state.user.name} (${state.user.email})` : state.user.name)
          : 'Signed in';
        els.entryDate.value = state.today || els.entryDate.value;
        els.previewDate.value = state.previewDate || state.today || '';
        els.viewInfo.textContent = state.view
          ? (state.view.mode === 'special'
            ? (state.view.title || '')
            : (state.view.reason || ''))
          : '';
      }

      function renderSpecialDates() {
        els.specialDates.replaceChildren();
        if (!state.specialDates.length) {
          const empty = document.createElement('div');
          empty.className = 'special-card muted';
          empty.textContent = 'No special dates yet.';
          els.specialDates.appendChild(empty);
          return;
        }
        state.specialDates.slice().sort((a, b) => {
          return String(a.type || '').localeCompare(String(b.type || '')) ||
            String(a.label || '').localeCompare(String(b.label || '')) ||
            String(a.dateKey || a.ruleType || '').localeCompare(String(b.dateKey || b.ruleType || ''));
        }).filter((item, index, list) => {
          const key = specialDateKey(item);
          return list.findIndex(other => specialDateKey(other) === key) === index;
        }).forEach(item => {
          const card = document.createElement('div');
          card.className = 'special-card';
          const top = document.createElement('div');
          top.className = 'entry-top';
          const left = document.createElement('div');
          const date = document.createElement('div');
          date.className = 'entry-date';
          date.textContent = describeSpecialDate(item);
          const label = document.createElement('div');
          label.className = 'muted';
          label.textContent = item.label;
          left.appendChild(date);
          left.appendChild(label);
          const chips = document.createElement('div');
          chips.className = 'chips';
          const repeat = document.createElement('span');
          repeat.className = 'chip';
          repeat.textContent = String(item.type || '').toLowerCase() === 'holiday'
            ? (item.repeatAnnually === false ? 'One time' : 'Annual')
            : (item.repeatAnnually ? 'Repeats annually' : 'One time');
          chips.appendChild(repeat);
          top.appendChild(left);
          top.appendChild(chips);
          card.appendChild(top);
          els.specialDates.appendChild(card);
        });
      }

      function describeSpecialDate(item) {
        if (!item) return '';
        const type = String(item.type || '').toLowerCase();
        if (type === 'holiday') {
          const ruleType = String(item.ruleType || '').toLowerCase();
          const ruleValue = String(item.ruleValue || '').trim();
          if (ruleType === 'fixed-month-day' && ruleValue) {
            return formatMonthDay(ruleValue);
          }
          if (ruleType === 'easter') {
            return 'Moves with Easter Sunday';
          }
          if (ruleType === 'conference-weekend') {
            const month = ruleValue ? ruleValue.charAt(0).toUpperCase() + ruleValue.slice(1) : 'Conference';
            return `${month} conference weekend`;
          }
          if (ruleType === 'nth-weekday') {
            return describeNthWeekdayRule(ruleValue);
          }
          if (ruleType === 'last-weekday') {
            return describeLastWeekdayRule(ruleValue);
          }
          if (ruleValue) {
            return ruleValue;
          }
          return 'Holiday';
        }
        return item.dateKey ? formatDateForDisplay(item.dateKey) : '';
      }

      function specialDateKey(item) {
        return [
          String(item && item.type ? item.type : '').toLowerCase(),
          String(item && item.label ? item.label : '').toLowerCase(),
          String(item && item.dateKey ? item.dateKey : '').toLowerCase(),
          String(item && item.ruleType ? item.ruleType : '').toLowerCase(),
          String(item && item.ruleValue ? item.ruleValue : '').toLowerCase(),
        ].join('|');
      }

      function formatMonthDay(value) {
        const match = String(value || '').trim().match(/^(\d{1,2})\/(\d{1,2})$/);
        if (!match) return value;
        const month = Number(match[1]) - 1;
        const day = Number(match[2]);
        const date = new Date(2026, month, day);
        return new Intl.DateTimeFormat(undefined, { month: 'short', day: 'numeric' }).format(date);
      }

      function describeNthWeekdayRule(ruleValue) {
        const parts = String(ruleValue || '').split(',').map(part => Number(part.trim()));
        if (parts.length !== 3 || parts.some(num => Number.isNaN(num))) return ruleValue;
        const [nth, weekday, monthIndex] = parts;
        const weekdayName = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][weekday] || 'day';
        const monthName = new Intl.DateTimeFormat(undefined, { month: 'long' }).format(new Date(2026, monthIndex, 1));
        return `${ordinal(nth)} ${weekdayName} in ${monthName}`;
      }

      function describeLastWeekdayRule(ruleValue) {
        const parts = String(ruleValue || '').split(',').map(part => Number(part.trim()));
        if (parts.length !== 2 || parts.some(num => Number.isNaN(num))) return ruleValue;
        const [weekday, monthIndex] = parts;
        const weekdayName = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][weekday] || 'day';
        const monthName = new Intl.DateTimeFormat(undefined, { month: 'long' }).format(new Date(2026, monthIndex, 1));
        return `Last ${weekdayName} in ${monthName}`;
      }

      function ordinal(value) {
        const n = Number(value);
        const s = ['th', 'st', 'nd', 'rd'];
        const v = n % 100;
        return `${n}${s[(v - 20) % 10] || s[v] || s[0]}`;
      }

      function renderEntries() {
        const query = els.search ? (els.search.value || '').trim().toLowerCase() : '';
        const mode = els.sortMode ? els.sortMode.value : 'newest';
        const entries = state.entries
          .filter(entry => {
            if (!query) return true;
            return [
              entry.displayDate,
              entry.weekday,
              entry.content,
              entry.location,
              entry.modifiedDisplay,
              (entry.labels || []).join(' '),
            ].join(' ').toLowerCase().includes(query);
          })
          .slice()
          .sort((a, b) => {
            const aTime = safeTime(a);
            const bTime = safeTime(b);
            return mode === 'oldest' ? aTime - bTime : bTime - aTime;
          });

        els.entries.replaceChildren();
        els.entryCount.textContent = `${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}`;
        if (!entries.length) {
          const empty = document.createElement('div');
          empty.className = 'entry-card muted';
          empty.textContent = 'No entries match the current filter.';
          els.entries.appendChild(empty);
          return;
        }
        entries.forEach(entry => els.entries.appendChild(buildEntryCard(entry)));
      }

      function buildEntryCard(entry) {
        const card = document.createElement('article');
        card.className = 'entry-card';
        const top = document.createElement('div');
        top.className = 'entry-top';
        const left = document.createElement('div');
        const date = document.createElement('div');
        date.className = 'entry-date';
        date.textContent = entry.displayDate || 'Undated';
        left.appendChild(date);
        if (entry.weekday) {
          const weekday = document.createElement('div');
          weekday.className = 'entry-meta';
          weekday.textContent = entry.weekday;
          left.appendChild(weekday);
        }
        const chips = document.createElement('div');
        chips.className = 'chips';
        (entry.labels || []).forEach(label => {
          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = label;
          chips.appendChild(chip);
        });
        if (entry.location) {
          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = `Location: ${entry.location}`;
          chips.appendChild(chip);
        }
        top.appendChild(left);
        top.appendChild(chips);
        card.appendChild(top);
        const content = document.createElement('div');
        content.className = 'entry-content';
        content.textContent = entry.content || '';
        card.appendChild(content);
        if (entry.modifiedDisplay) {
          const modified = document.createElement('div');
          modified.className = 'entry-meta';
          modified.textContent = `Modified: ${entry.modifiedDisplay}`;
          card.appendChild(modified);
        }
        return card;
      }

      function safeTime(entry) {
        const value = entry.modified || entry.timestamp || entry.dateKey;
        const parsed = Date.parse(value);
        return Number.isNaN(parsed) ? 0 : parsed;
      }

      function formatDateForDisplay(value) {
        if (!value) return '';
        const parsed = Date.parse(value + (String(value).length === 10 ? 'T00:00:00' : ''));
        if (Number.isNaN(parsed)) return value;
        return new Intl.DateTimeFormat(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }).format(new Date(parsed));
      }

      function submitEntry() {
        const contents = els.contents.value.trim();
        const location = els.entryLocation.value.trim();
        if (!contents) {
          setStatus('Enter some text before saving.');
          return;
        }
        setLoading(els.saveEntryBtn, true, 'Save entry');
        setStatus('Saving entry...');
        google.script.run
          .withSuccessHandler(() => {
            els.contents.value = '';
            els.entryLocation.value = '';
            setLoading(els.saveEntryBtn, false, 'Save entry');
            setStatus('Entry saved.');
            loadAppData(els.previewDate.value || state.previewDate || '');
          })
          .withFailureHandler(err => {
            setLoading(els.saveEntryBtn, false, 'Save entry');
            setStatus(err && err.message ? err.message : 'Failed to save entry.');
          })
          .addEntry(contents, els.entryDate.value, location);
      }

      function changePreviewDate(dateValue) {
        setStatus('Updating preview date...');
        loadAppData(dateValue);
      }

      function submitSpecialDate() {
        const date = els.specialDate.value;
        const label = els.specialLabel.value.trim();
        const repeatAnnually = els.repeatAnnually.value === 'true';
        if (!date || !label) {
          setStatus('Add both a date and a label.');
          return;
        }
        setLoading(els.saveSpecialBtn, true, 'Add date');
        setStatus('Saving special date...');
        google.script.run
          .withSuccessHandler(() => {
            els.specialDate.value = '';
            els.specialLabel.value = '';
            els.repeatAnnually.value = 'true';
            setLoading(els.saveSpecialBtn, false, 'Add date');
            setStatus('Special date saved.');
            loadAppData(els.previewDate.value || state.previewDate || '');
          })
          .withFailureHandler(err => {
            setLoading(els.saveSpecialBtn, false, 'Add date');
            setStatus(err && err.message ? err.message : 'Failed to save special date.');
          })
          .addSpecialDate(date, label, repeatAnnually);
      }

      function wireEvents() {
        els.entryForm.addEventListener('submit', event => { event.preventDefault(); submitEntry(); });
        els.specialDateForm.addEventListener('submit', event => { event.preventDefault(); submitSpecialDate(); });
        if (els.search) els.search.addEventListener('input', renderEntries);
        if (els.sortMode) els.sortMode.addEventListener('change', renderEntries);
        const refreshPreview = () => changePreviewDate(els.previewDate.value);
        els.previewDate.addEventListener('change', refreshPreview);
      }

      wireEvents();
      loadAppData();
    </script>
  </body>
</html>
